<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HR RC — پرۆفایلەکەم</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f59e0b">
  <link rel="apple-touch-icon" href="assets/icon.png">
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; }
    .sidebar { right: 0; left: auto; transform: translateX(100%); }
    .sidebar.open { transform: translateX(0); }
    .main-content { margin-right: 260px; margin-left: 0; }
    .topbar { flex-direction: row-reverse; }
    .topbar-title { margin-right: 12px; margin-left: 0; }
    .nav-item { flex-direction: row-reverse; text-align: right; }
    .nav-icon { margin-right: 0; margin-left: 10px; }
    .sidebar-header { flex-direction: row-reverse; }
    .sidebar-user { text-align: right; }
    .page-header { text-align: right; }
    .card-header { flex-direction: row-reverse; }
    .card-title { flex-direction: row-reverse; }
    @media (max-width: 768px) {
      .sidebar { right: 0; left: auto; transform: translateX(110%); }
      .sidebar.open { transform: translateX(0); }
      .main-content { margin-right: 0; }
    }
    .company-logo-img { height: 36px; width: auto; object-fit: contain; }

    .profile-hero {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 32px 24px;
      text-align: center;
      margin-bottom: 20px;
    }
    .profile-avatar-big {
      width: 88px; height: 88px; border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-500), #f97316);
      display: flex; align-items: center; justify-content: center;
      font-size: 34px; font-weight: 700; color: #000;
      margin: 0 auto 16px;
    }
    .profile-name  { font-size: 22px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
    .profile-pos   { font-size: 14px; color: var(--text-muted); }

    .info-list { display: flex; flex-direction: column; gap: 0; }
    .info-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 15px 20px;
      border-bottom: 1px solid var(--border-color);
      gap: 12px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: var(--text-muted); font-size: 13px; flex-shrink: 0; }
    .info-value { font-weight: 600; color: var(--text-primary); font-size: 14px; text-align: left; }
  </style>
</head>
<body>
<div id="sidebarOverlay" class="sidebar-overlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <img src="assets/logo.png" alt="HR RC" class="company-logo-img"
         onerror="this.style.display='none';document.getElementById('sbLogoFallback').style.display='flex'">
    <div id="sbLogoFallback" style="display:none;align-items:center;gap:8px">
      <div class="sidebar-logo-icon">🏢</div>
      <div class="sidebar-logo-text">
        <div class="brand-name">HR RC</div>
        <div class="brand-sub">پۆرتاڵی کارمەند</div>
      </div>
    </div>
  </div>
  <div class="sidebar-user">
    <div class="sidebar-user-name" id="sidebarUserName">چاوەڕێبکە...</div>
    <div class="sidebar-user-role" id="sidebarUserRole">کارمەند</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section-label">مینیوی سەرەکی</div>
    <a class="nav-item active" href="profile.html"><span class="nav-icon">👤</span> پرۆفایلەکەم</a>
    <a class="nav-item" href="attendance.html"><span class="nav-icon">🕐</span> ئامادەبوون</a>
    <a class="nav-item" href="announcements.html"><span class="nav-icon">📢</span> ڕاگەیاندنەکان</a>
    <a class="nav-item" href="salary.html"><span class="nav-icon">💰</span> مووچەکەم</a>
    <a class="nav-item" href="leaves.html"><span class="nav-icon">🌴</span> مۆڵەتەکانم</a>
  </nav>
  <div class="sidebar-footer">
    <button class="btn btn-ghost btn-block" data-logout>🚪 چوونەدەرەوە</button>
  </div>
</aside>

<div class="main-content">
  <header class="topbar">
    <div class="topbar-avatar" id="topbarAvatar">?</div>
    <span class="topbar-date" id="topbarDate"></span>
    <div class="topbar-spacer"></div>
    <span class="topbar-title">پرۆفایلەکەم</span>
    <button class="topbar-hamburger" id="hamburger">☰</button>
  </header>
  <main class="page-content">
    <div class="page-header" style="text-align:right">
      <h1 class="page-title">پرۆفایلەکەم</h1>
      <p class="page-subtitle">زانیارییەکانی تایبەت بە تۆ</p>
    </div>

    <!-- Hero -->
    <div class="profile-hero">
      <div class="profile-avatar-big" id="profileAvatar">?</div>
      <div class="profile-name" id="profileName">—</div>
      <div class="profile-pos" id="profilePos">—</div>
    </div>

    <!-- Info Card -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">
          <div class="card-title-icon gold">👤</div>
          زانیاری کارمەند
        </div>
      </div>
      <div class="info-list">
        <div class="info-row">
          <span class="info-label">🪪 ناسنامە</span>
          <span class="info-value" id="pId">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">🏢 بەش</span>
          <span class="info-value" id="pDept">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">💼 پۆست</span>
          <span class="info-value" id="pPosition">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">📞 تەلەفۆن</span>
          <span class="info-value" id="pPhone">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">📧 ئیمەیڵ</span>
          <span class="info-value" id="pEmail">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">📅 بەرواری کارەکە</span>
          <span class="info-value" id="pHireDate">—</span>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="assets/script.js?v=4"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const user = requireAuth(false);
  if (!user) return;

  // Fill avatar
  const initials = getInitials(user.name || user.id || '?');
  document.getElementById('profileAvatar').textContent = initials;
  document.getElementById('topbarAvatar').textContent  = initials;

  // Fill info
  document.getElementById('profileName').textContent = user.name       || '—';
  document.getElementById('profilePos').textContent  = (user.position  || '') + (user.department ? ' · ' + user.department : '');
  document.getElementById('pId').textContent         = user.id         || '—';
  document.getElementById('pDept').textContent       = user.department || '—';
  document.getElementById('pPosition').textContent   = user.position   || '—';
  document.getElementById('pPhone').textContent      = user.phone      || '—';
  document.getElementById('pEmail').textContent      = user.email      || '—';
  document.getElementById('pHireDate').textContent   = formatDate(user.hireDate) || '—';
});
</script>
</body>
</html>
